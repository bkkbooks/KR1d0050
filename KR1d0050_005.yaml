body:
  text: 內外服制通釋卷五宋車垓撰大功九月正服為從父兄弟姊妹伯父子女祖父已身叔父子女釋曰從父兄弟姊妹既親堂伯叔之子女所謂堂兄弟姊妹也堂兄弟與親兄弟一間耳既為親兄弟服期則宜為堂兄弟服大功也為衆孫男女祖身子孫女在室者釋曰自嫡孫外皆謂之衆孫也身既為衆子服期故宜為衆孫服大功也降服為女適人者父母身女適人者釋曰女在室父母為正服不杖期既適人則為降服大功也為伯叔父及兄弟及兄弟之子為人後者伯父姪祖父已身叔父姪已上皆為人後釋曰已於伯叔父及兄弟及兄弟之子本皆不杖期親也今彼既出為人後則與已又踈逺矣故為之降服大功也若為親伯叔父後則不降為姑姊妹及兄弟之女適人者長姑兄弟姪祖父已身少姑姊妹已上皆適人者釋曰已于在室姑姊妹及兄弟之女本皆不杖期親也今既適人則為他家婦矣故為之降服大功也為人後者為伯叔父姑姊妹兄弟及兄弟之子伯叔父兄弟姪本生祖本生父已身為人後姑在室者姊妹在室者釋曰已于伯叔父姑姊妹兄弟姪本皆不杖期親也今已既為人後則以所後之宗為重矣故於此數親皆降服大功也女適人者為伯叔父姑姊妹及兄弟之子伯叔父兄弟姪祖父母女身適人者姑在室者姊妹在室者釋曰女在室于伯叔父姑姊妹兄弟姪本皆不杖期親也既已適人則所重在夫家矣故于此數親皆降服大功也女適人者為嫁母出母母嫁母出母女身適人者釋曰嫁女于母本降服不杖期母或為父棄出或父卒再嫁則又降為大功也嫁母出母為女適人者母身嫁母出母女適人者釋曰母為嫁女服大功正也母雖為父棄出及父卒再嫁服亦同也或曰嫁女于嫁母出母服有降而嫁母出母於嫁女則無所降者何也蓋女為母服由父而推母被出再嫁則非父之妻而失母之道矣故先王特降其服若母之于女則義無所從殺也故不降義服為衆子婦甲長子妻為嫡孫舅姑身乙餘皆衆子婦丙釋曰自嫡子婦外皆衆子婦也舅姑為嫡婦不杖期故為衆婦服大功也周制庶婦小功唐貞觀十四年侍中魏徵奏衆子婦舊服小功今請與凡弟子婦同為大功宋朝因之為兄弟子之婦兄姪婦父已身弟姪婦釋曰已為兄弟之子服不杖期矣則為其妻宜服大功也為夫祖父母夫祖父母夫父母妻身釋曰孫于祖父母正服齊衰不杖期而其妻則止服大功也蓋孫于祖父母親也其妻于夫之祖父母則義也故服不從于夫若夫以嫡孫承祖父母重而其妻亦從服者此則重嫡孫故也為夫伯叔父母夫伯父母夫祖夫父母妻身夫叔父母釋曰夫為伯叔父母服不杖期矣則妻宜為之服大功也為夫兄弟之子婦夫兄子婦夫父妻身夫弟子婦釋曰婦人既為夫兄弟之子服不杖期矣則宜為其妻服大功也此則俗所謂伯叔母為姪婦服也夫為人後其妻為本生舅姑夫本生父母夫為人後妻身釋曰夫為人後者為本生父母降服不杖期矣則其妻為本身舅姑宜又降為大功也為人後及女適人者為伯叔母伯母祖父母已身為人後者女適人者叔母釋曰已于伯叔母本不杖期親也今已既為人後既已適人則為伯叔母降服大功也為夫兄弟之子為人後及女適人者夫兄弟子女為人後適人者夫父妻身夫兄弟子女為人後適人者釋曰伯叔母于夫之兄弟之子女本不杖期親也今彼既為人後既已適人則伯叔母為之降服大功也內外服制通釋卷五

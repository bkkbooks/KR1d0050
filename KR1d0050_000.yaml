body:
  text: 內外服制通釋禮類二附録提要臣等謹案內外服制通釋七卷宋車垓撰垓字經臣天台人咸淳中由特奏名授迪功郎浦城縣尉以年老不赴德祐二年卒垓及從兄若水皆受業於季父安行安行受業於陳埴埴受業於朱子故垓是書一仿文公家禮而補其所未備有圖有說有名義有提要凡正服義服加服降服皆推闡明晰具有條理牟楷序謂家禮著所當然此釋其所以然蓋不誣也朱彛尊經義考曰車氏書余所儲者闕第八卷以後卷八書目為三殤以次降服如應服期而殤者則降服大功應服大功而殤者降服小功應服小功而殤者降服緦麻卷九為深衣疑義其標題則仍稱九卷注存而不注闕蓋未敢斷後二卷之必佚然今所傳寫皆與彛尊本同則此二卷已佚矣據馬良驥所作垓行狀其深衣疑義本别為一書特附録於此書之後良驥所舉用皇氏廣頭在下之注以續袵為裳之上衣之旁者說亦頗合惜其全文不可睹也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀余聞雙峰先生服制有書舊矣而常恨莫之見也年幾耳順先生之子大雅翁始編以示余且俾題其首余以晚學辭弗獲遂為之言曰美哉是書其文公家禮之羽翼歟或曰喪服之制家禮備矣此書之作不殆於贅乎哉余謂不然家禮著其所當然此則釋其所當然也孔子曰民可使由之不可使知之徒由之而不求以知之可乎哉此先生之書所以作也然禮有冠昏喪祭而此獨有取於喪又何歟禮之行由於俗之厚俗之厚由於喪之重也周公所以成周家忠厚之俗亦惟喪祭之重而已喪祭之重民俗之厚也民俗厚而后冠昏之禮可行矣噫親喪固所自盡也世降俗澆齊斬且莫之盡况期功乎期功之正者且莫之盡况若義若降若加者乎噫安得如先生者出而司風俗之柄即是書而躬行之且律天下之人盡行之則變澆為淳有不難者矣噫後之人讀是書而昧於天理者烏足以知先生之心哉先生姓車氏諱垓字經臣玉峰先生之委也至元後已卯暢月下浣葛屋野人牟楷仲裴謹序

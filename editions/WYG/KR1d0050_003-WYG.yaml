body:
  text: 内外服制通釋卷三宋車垓撰五服圖説斬衰三年正服子為父父釋曰白虎通云父矩也以矩度教子也又為考成也言成徳也又云父者覆也謂如天之覆於下也萬物本乎天而生於地男女本乎父而生于母故天高而地下父尊而母卑是以尊父如天也故子為父服斬衰三年為母則齊衰也加服嫡孫父卒為祖謂若曾髙祖承重者也甲父之長子祖之嫡孫祖父祖之嫡子先祖而亡乙父之次子祖之衆孫丙父之衆子釋曰廣雅云孫順也順於祖也許慎云從子從系系續也言順續先祖之後也嫡孫為祖者若有嫡子則無嫡孫謂如父生三子其長子為祖之長孫父既先祖而亡則長孫為嫡孫承祖重則服斬衰三年而衆孫則服期而已或父在而祖亡則長孫與衆孫同故曰有嫡子無嫡孫也父為長子謂嫡子當為後者也甲嫡長子父承祖父後者乙次子丙衆子釋曰廣雅云子孜也以孝事父常孜孜也父者子之天高尊義重莫如父母昊天罔極之恩故子為父服三年之重服而父為長子亦服三年之重服者葢重其當先祖之正體將代已為宗廟主非衆子比也若衆子為父則不得為長子三年不承宗也先祖正體者嫡嫡相承也正為體在長子之正傳正于髙祖體重其正服故三年義服婦為舅舅夫之父婦身釋曰説文云婦服也從女從帚持帚洒掃也白虎通云婦者服也以禮屈服於舅姑者也舅者舊也舊老人之稱也尊如父而非父者舅也夫既為父服斬衰三年故婦亦從夫服斬衰三年也若夫為高曽祖後者其妻從服亦如之謂嫡孫承祖重或曽𤣥嫡孫承曽髙祖重服斬衰三年者其妻亦從服斬衰三年也周及唐齊衰期宋乾徳三年十一月勅改服斬衰三年為人後者為所後父祖所後祖也父所後父也無子立兄弟之子以為後為人後者身釋曰為人後者為之子也故為所後父服斬衰三年或為所後祖承重亦如之而為本生父則降服不杖期而已若夫為人後妻則從夫服其服也妻為夫夫妻身釋曰白虎通云夫者扶也以道扶接也妻者齊也禮云夫者妻之天也飲食存亡貴賤聽于夫命夫至尊也故妻為夫義服斬衰三年也馬融曰婦人天夫故曰至尊妾為夫君夫君妾身有子者也釋曰妾接也接奉夫君如妻之體也古者立昬契為妾者妾與婢同元有顧契主人通幸為妾不通幸為婢又名例勅云五品以上妾得用子䕃又户令妻犯七出内惡疾而夫不忍離棄者明聽娶妾昬如妻禮故今俗呼為小妻也妾謂夫為君者君至尊也妻為夫且斬衰則妾為夫君安得而不斬衰乎齊衰三年正服子為母母子身長子衆子養子皆同釋曰廣雅云母牧也牧養也言養育子也又為妣嫓也嫓匹於夫也禮云生曰母死曰妣論語云子生三年然後免于父母之懐夫三年之喪天下之通喪也律云父母之喪終身憂戚三年從吉自為達禮也庶子為嫡母庶子為其母亦同而為父後則降為緦也加服嫡孫父卒為祖母甲嫡祖母祖父先亡母父先亡乙衆丙衆釋曰義與嫡孫為祖同但為祖母則服齊衰三年若祖在則止服杖期耳母為長子當為後者也甲嫡長子母乙次皆衆子丙釋曰父為長子服斬衰三年者則母亦為之服齊衰三年也義服婦為姑姑夫之母婦身釋曰白虎通云姑者故也故老人之稱也親如母而非母者姑也婦視姑如母故為姑服齊衰三年而為本生母則降服不杖期而已或夫為祖後及曽髙祖後服重服服者其婦從服亦如之為人後者為所後母祖所後祖也母所後母也為人後者身釋曰為人後者既為所後父服斬衰三年則為所後母服齊衰三年也若為所後祖承重亦如之為繼母正母父先娶生已者也父子身繼母父後娶者也釋曰正母死或被出而父别娶者謂之繼母繼母者繼吾親母之體也故子亦為之義服齊衰三年也為慈母庶母父妾生已而亡嫡母父正室子身慈母父妾養已者釋曰庶母早死父命他妾無子者養已是為慈母慈養義重比同親母故子亦為義服齊衰三年也若嫡母在則降為養母養母子身釋曰養母者謂養育同宗之子及異姓三嵗以下遺弃之子者也子得其收養以至長大恩義非輕比同親母故亦宜為義服齊衰三年也繼母為長子正母父先娶生已者父長子繼母身父後娶者釋曰繼母者繼吾母之體也子為繼母義服齊衰三年則繼母之於長子亦猶親母之於長子也故合為義服齊衰三年妾為君之長子夫君嫡長子女君次子妾身庶子釋曰生子之妾謂主人曰夫君謂主母曰女君君之長子乃為後承重者也父母尚為之服重服三年其妾亦合從服也内外服制通釋卷三

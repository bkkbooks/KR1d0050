body:
  text: 雙峰先生內外服制通釋余聞其書舊矣今始獲一覩其發明朱夫子家禮殆無餘藴豈曰小補之哉因思丱角時從玉峰先生於上蔡東湖書院引試聖則堂舉孟子使契為司徒教以人倫章為題先生曰此帝堯命契教天下萬世以人道之始也余對曰朱夫子喪禮一書豈非教天下萬世以人道之終乎先生喟然曰小子真能以三隅反矣雙峰先生玉峰先生之委也宜其熟於禮也烏乎微契不能啓之於前微朱夫子不能成之於後微先生通釋又不能使人行著而習察也讀先生之書者孝弟之心油然如風之於草雷之於蟄豈曰小補之哉時至元後庚辰六月望日東海布衣此山張復謹跋先君成此書未脫藁而更化及逃竄山谷竟以疾終家孰悉為煨燼時瑢兄弟尚幼若罔聞知洎長有識而手澤無存蚤夜痛心有負先志嵗庚午春先師栖筠鄭先生亡瑢往吊于先生書房中見內外服制通釋一書儼然具在驚喜無地栖筠蓋先君之愛友曽傳之於是編寫成帙衆謂是書有補世教瑢不敢私遂鋟諸梓與衆共之至元後戊寅孟春望日男瑢百拜謹識是書之出可與文公喪禮相表裏而並行也或曰朱子一代道學之宗其肩可比乎曰不然朱子于是書猶君子之射也吾伯父雙峰于是書乃養由基之射也學專而精詳而明有補家禮之未偹有發前賢之未發非謂學問相高也為之圖使人易見為之釋使人易知易見易知親疏隆殺之等人人可得而盡矣必師友講說云乎有補于治教明矣時至元後戊寅仲夏中浣從子惟賢百拜謹跋

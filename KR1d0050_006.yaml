body:
  text: 內外服制通釋卷六宋車垓撰小功五月正服為從祖祖父從祖祖姑從祖祖父祖兄弟也曽祖祖父已身姪孫也從祖祖姑祖姊妹也釋曰此即姪孫為伯祖叔祖姑婆服也蓋伯祖叔祖姑婆為姪孫服小功故姪孫為之亦小功也為兄弟之孫兄子孫曰姪孫男女父已身弟子孫曰姪孫男女釋曰此即伯祖叔祖為姪孫服也蓋姪孫為伯祖叔祖服小功故伯祖叔祖為姪孫亦小功也為從祖父從祖姑伯祖從祖父父從兄弟也曽祖祖父已身叔祖從祖姑父從姊妹也釋曰此堂姪為堂伯叔姑服也蓋堂伯叔姑為堂姪服小功故堂姪為之服亦小功也為從父兄弟之子伯父從兄子祖父已身叔父從弟子釋曰説義與前同此即堂伯叔為堂姪報服小功也為從祖兄弟姊妹伯父從祖伯父從祖兄弟曽祖祖父叔父從祖叔父從祖姊妹釋曰此所謂再從兄弟姊妹與已同曽祖者也已為同祖之兄弟姊妹大功矣則為同曽祖之兄弟姊妹宜服小功也為外祖父母及舅從母舅母兄弟也外祖父母母甥身從母母姊妹也釋曰此即母之父母兄弟姊妹也先王制服以本宗為重故於父之父母兄弟姊妹皆不杖期而於母之父母兄弟姊妹則皆服小功也為甥姊子曰甥父舅身妹子曰甥釋曰甥為舅服小功故舅為甥亦小功也女為姊妹之子姊子曰甥父女身妹子曰甥釋曰親與前同此即母姨為甥服也甥為姨服小功故姨為甥亦小功也為同母異父之兄弟姊妹甲父母見嫁之夫子女母先嫁所生者母乙父母再嫁之夫子女母再嫁所生者釋曰母先嫁所生之子女與再嫁所生之子女兩家相謂為同母異父之兄弟姊妹也以同母言若為重以異父言則為輕制禮者酌輕重之宜而定為小功之服當矣若公叔木之大功狄儀之齊衰豈不失之過乎木音庶出檀弓降服為孫為人後者已身子孫為人後釋曰祖為孫正服大功孫既為人後則宜服小功也為孫女適人者已身子孫女適人者釋曰孫女既適人則降為小功也為從父兄弟之為人後者伯父從父兄弟為人後祖父已身叔父從父兄弟為人後釋曰從父兄弟者謂親伯叔之子即堂兄弟也已於親兄弟為人後者既降服大功則於堂兄弟之為人後者宜降服小功也為從父姊妹適人者伯父從父姊妹適人者祖父叔父從父姊妹適人者釋曰從父姊妹謂親伯叔之女堂姊妹也已於親姊妹之適人者已降服大功則於堂姊妹之適人者宜降服小功也為人後者為從父兄弟姊妹伯父從父兄弟本生祖本生父已身為人後者叔父從父姊妹釋曰為人後與女適人其義同也故已于從父兄弟姊妹本服大功今已既為人後則為之降服小功也女適人者為從父兄弟姊妹伯父從父兄弟祖父已身女適人者叔父從父姊妹釋曰説與前同已在室於堂兄弟姊妹本服大功今已既適人則為降服小功也為人後者為其姑姊妹姪之適人者長姑姊姪本生祖本生父已身為人後者少姑妹姪以上皆適人者釋曰已於姑姊妹姪本不杖期親也已既為人後而姑姊妹姪又適人則為降服小功也女適人者為伯叔父兄弟姪之為人後者伯父兄姪祖父已身適人者叔父弟姪以上皆為人後釋曰女人於親伯叔兄弟姪本不杖期服也今已既適人若伯若叔若兄若弟若姪又為人後則皆為降服小功也義服為從祖祖母從祖祖母曽祖祖父已身從祖祖母釋曰從祖祖母乃祖之兄弟之妻即俗呼為伯祖母叔祖母者是也已為伯祖父叔祖父正服小功故為伯祖母叔祖母亦義服小功也為夫兄弟之孫夫兄子孫夫父妻身夫弟子孫釋曰此伯叔祖母為姪孫服也伯叔祖為姪孫正服小功故伯叔祖母亦為之義服小功也為從祖母伯祖從祖母曽祖祖父已身叔祖從祖母釋曰從祖母者即父之堂兄弟之妻俗亦呼為伯母叔母者也堂姪為堂伯叔正服小功故為堂伯母堂叔母亦義服小功也為夫從父兄弟之子夫伯夫從兄子夫祖夫父妻身夫叔夫從弟子釋曰此即夫之堂姪也蓋堂伯叔母為夫堂姪報服小功也為夫之姑姊妹夫長姑夫姊夫祖夫父妻身夫少姑夫妹釋曰婦人於夫之姑姊妹不問在室與適人皆為義服小功也蓋婦人于夫之姑姊妹本無情分但以義而服小功之服可謂適輕重之宜矣故雖適人不降蓋亦引而進之之義也女為兄弟姪之妻兄之妻姪婦父母女身弟之妻姪婦釋曰女於親兄弟姪之妻所謂兄嫂弟婦及姪婦者也為之義服小功即兄弟姪之妻與夫之姑姊妹相為服也已雖適人亦不降為娣姒婦或云妯娌長子婦父母夫子婦釋曰娣姒者兄弟之妻相呼之名也長婦呼稚婦為娣稚婦呼長婦為姒蓋以自身之長少為名不問夫之長幼也是皆以義而相聚故皆以小功相為服也為兄弟之妻兄妻父已身弟婦釋曰兄弟之妻所謂兄嫂弟婦也為之義服小功蓋叔為嫂服伯為弟婦服也嫂叔相服説見下文為夫之兄弟夫兄夫父母妻身夫弟釋曰妻稱夫之兄曰伯稱夫之弟曰叔皆為義服小功也通典云嫂叔服議周制嫂叔不相為服夫之兄弟何以無服也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎名者人治之大者也可無謹乎道猶行也言婦人之性無常故嫁于父行則為母行嫁于子行則為婦行弟妻卑逺之故謂之婦兄嫂尊嚴之故謂之嫂亦可謂之母乎者言不可也嫂尊行也尊之之稱也是謂男女之禮制爾若以母婦之服服兄弟之妻兄弟之妻以舅子之服服已是亂昭穆之序也父母兄弟夫婦之理人倫之大也同姓後宗合族屬異姓主名治際會名者而男女有别是也無服而為位者惟嫂叔及婦人降而無服者麻雖無服猶弔服加麻袒免為哭位也正言叔尊嫂也兄妐於弟之妻則不能妐之容切夫之兄也魏晉而降議論異同魏太尉蔣濟引小功章娣姒婦此三字嫂叔之父也晉成粲曰嫂叔應有服作傳者曠曰無服蔣濟引娣姒婦證非其義論云為夫兄弟妻婦降一等則服夫之兄弟固已明矣尊卑相侔服則亦服由此論之嫂叔大功又得而從宋庾蔚之云蔣濟成粲蔑棄聖賢經傳而苟虛樹已説可謂乖於禮矣至唐貞觀十四年太宗謂侍臣曰同爨尚有緦麻之恩而嫂叔無服宜集學者詳議侍中魏徵等議曰嫂叔之不服蓋推而逺之也禮繼父同居則為之服未嘗同居則不為服從母之夫舅之妻二人不相為服或曰同爨緦然則繼父之徒並非骨月服重由乎同爨恩輕在乎異居故知制服雖係于名亦緣恩之厚薄也或有長年之嫂遇孩提之叔劬勞鞠養情在于生同飢共寒契闊偕老譬同居之繼父與他人之同爨情義之淺深寧可同日在其生也愛之同于骨肉及其死也則推而逺之尋求本原深所未喻若推而逺之誠為不可生而同居死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱載籍非一鄭仲虞則見之必冠孔伋則哭之為位此躬踐教義仁深孝友察其所行之旨豈非先覺者歟但于時上無哲王禮非下之所議遂使深情鬱乎千載至理藏于萬古今屬欽明在辰聖人有作立為中制宜服小功交相為報庶合禮情制可開元五年左常侍元行沖議曰嫂叔不服避嫌疑也若引同爨之緦以忘推逺之迹既乖前聖亦謂難從至二十年中書令蕭嵩奏依貞觀禮為定宋朝因之為嫡孫婦已身子嫡孫婦釋曰嫡孫承祖重三年者其妻謂之嫡孫婦也祖為衆孫婦服緦而為承重嫡孫之婦則義服小功也注云有嫡婦則無嫡孫婦者謂已立嫡孫其子婦尚存則不立嫡孫之婦也若嫡子嫡婦俱亡則立嫡孫婦也曾玄孫與曽髙祖承重其妻亦依嫡孫婦之服也庶子為嫡母之父母兄弟姊妹舅外祖父母嫡母已身妾婢之子從母釋曰此即外孫為外祖父母甥為舅為姨之服也為人子者于外祖父母及母舅母姨皆小功五月服雖庶子亦同者蓋亦引而進之之義也嫡母死則不服母出為繼母之父母兄弟姊妹舅外祖父母繼母已身出母之子從母釋曰母被出或母亡而父别娶是為繼母則已以繼母為母矣故亦為繼母之父母兄弟姊妹服外家服與前同也為庶母慈已者甲妾無子乙妾有子曰庶母父命養正室之子母已身丙妾有子曰庶母非父命而自乳養丁妾之子為子丁妾生子而亡釋曰妾子呼其生母為庶母衆子呼父有子之妾亦曰庶母衆子為庶母本服緦麻庶母或乳養已則為加服小功也內外服制通釋卷六

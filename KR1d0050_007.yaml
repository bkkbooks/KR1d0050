body:
  text: 內外服制通釋卷七宋車垓撰緦麻三月正服為族曽祖父族曽祖姑族曽祖父高祖曽祖父已身族曽祖姑釋曰族曽祖父族曽祖姑者曽祖之親兄弟姊妹也已為曽祖服齊衰五月矣則宜為曽祖之兄弟姊妹服緦麻三月也為兄弟之曽孫兄子孫曽孫父已身弟子孫曽孫釋曰兄弟之曽孫姪孫之子也已為姪孫小功矣則宜為姪孫之子緦麻也為族祖父族祖姑族曽祖父族祖父高祖曽祖祖父已身族曽祖父族祖姑釋曰族祖父族祖姑者祖之堂兄弟姊妹也已為祖之親兄弟姊妹小功矣則宜為祖之堂兄弟姊妹緦麻也為從父兄弟之孫伯父從父兄子孫祖父已身叔父從父弟子孫釋曰從父昆弟之孫即堂兄弟之孫也已為堂兄弟之子小功矣則宜為其孫緦麻也為族父族姑族曽祖父族祖父族父高祖曽祖祖父已身族曽祖父族祖父族姑釋曰族父族姑者吾父之再從兄弟姊妹吾髙祖之曽孫也故宜無服緦麻為從祖兄弟之子女出嫁則不服族姊妹以下姑及姊妹孫女出嫁並準此伯祖從祖父從祖兄子曽祖祖父已身叔祖從祖父從祖弟子釋曰從祖兄弟之子者即已再從兄弟之子父堂兄弟之孫也已為再從兄弟小功矣則宜為其子緦麻也若其女已出嫁則無服為族兄弟姊妹姊妹謂在室者族曽祖父族祖父族父族兄弟高祖曽祖祖父父已身族曽祖父族祖父族父族姊妹釋曰族兄弟姊妹者已之三從兄弟姊妹與已同高祖者也故亦宜為服緦麻為曽孫玄孫己身子孫曽孫元孫釋曰曽祖父母為曽孫服緦麻三月而高祖父母為玄孫亦同若曽玄孫之當承重者則服不杖期為外孫外祖身女外孫釋曰外孫者女所生之子也外孫為外祖服小功而外祖為外孫止服緦麻也夫外孫為外祖服小功者由母而推之也故重而外祖為外孫服緦麻者由女而推之也故輕為從母兄弟姊妹從母母姊子曰兩姨兄弟外祖父母母已身從母母妹子曰兩姨兄弟釋曰即俗所謂兩姨兄弟姊妹者也已為姨服小功矣則宜為其子服緦麻也為外兄弟長姑姑之子外兄弟也祖父已身少姑姑之女外姊妹也釋曰已于姑之子女所謂外兄弟姊妹者也已為其母服大功而為其子則服緦麻也夫為出嫁姑服大功者由吾父之同氣也故重于姑之子女服緦麻者由其父之異姓也故輕為內兄弟舅舅之子內兄弟也外祖父母母已身舅舅之女內姊妹也釋曰已于舅之子女所謂內兄弟姊妹者也已為舅服小功矣則宜為其子服緦麻也夫內兄弟與外兄弟皆服緦麻者親同服亦同也然姑則父之姊妹也舅則母之兄弟也其親亦同而服乃不同者何也蓋姑之服由父之同氣推之也故重舅之服由母之異姓推之也故輕降服為從祖祖父從祖父之為人後者從祖祖父從祖伯父曽祖祖父已身從祖祖父從祖叔父已上並為人後釋曰從祖祖父者祖之兄弟已之伯祖叔祖也從祖父者父之堂兄弟已之堂伯堂叔也正服本皆小功之親今彼既為人後則為降服緦麻也為從祖祖姑從祖姑之適人者從祖祖姑從祖姑曽祖祖父已身從祖祖姑從祖姑已上並適人者釋曰從祖祖姑者祖之姊妹已之姑婆也從祖姑者父之堂姊妹已之堂姑也在室本皆小功之親既已適人則為降服緦麻也為人後者為從祖祖父從祖祖姑從祖祖父曽祖祖父已身為人後者從祖祖姑釋曰祖之兄弟姊妹已之從祖祖父從祖祖姑即俗呼為伯祖父叔祖父姑婆者是也正服皆小功親今己既為人後則為降服緦麻也女適人者為從祖祖父從祖祖姑從祖祖父曽祖祖父已身為人後者從祖祖姑釋曰説義與前同己在室則皆為小功服今既適人則為降服緦麻也為人後者為從祖父從祖姑伯祖從祖父曽祖祖父已身為人後者叔祖從祖姑釋曰從祖父者父之堂兄弟已之堂伯叔也從祖姑者父之堂姊妹已之堂姑也姪于此者本皆小功之親今已既出為人後則為降服緦麻也女適人者為從祖父從祖姑伯祖從祖父曽祖祖父已身女適人者叔祖從祖姑釋曰説義與前同姪于堂伯叔堂姑本皆小功之親今已既適人則為降服緦麻也為從祖兄弟之為人後者伯祖從祖父從祖兄為人後曽祖祖父已身叔祖從祖父從祖弟為人後釋曰從祖兄弟者即已之再從兄弟也正服本小功之親今彼既出為人後則為降服緦麻也為從祖姊妹適人者伯祖從祖父從祖姊適人者曽祖祖父已身叔祖從祖父從祖妹適人者釋曰從祖姊妹即已之再從姊妹蓋與已同曽祖者也在室則皆為小功親既適人則為降服緦麻也為人後者為從祖兄弟姊妹伯祖從祖父從祖兄弟曽祖祖父已身為人後者叔祖從祖父從祖姊妹釋曰從祖兄弟姊妹亦已之再從兄弟姊妹與己同曽祖者也正服本皆小功之親今已既出為人後則為降服緦麻也女適人者為從祖兄弟姊妹伯祖從祖父從祖兄弟曽祖祖父已身適人者叔祖從祖父從祖姊妹釋曰説義與前同已于再從兄弟姊妹亦皆小功之親今已既適人則為降服緦麻也為從父兄弟之子為人後者伯從父兄子為人後者祖父已身叔從父弟子為人後者釋曰從父兄弟之子者即堂兄弟之子已之堂姪也正服乃小功之親姪既出為人後則為降服緦麻也為從父兄弟之女適人者伯從父兄女適人者祖父已身叔從父弟女適人者釋曰從父兄弟之女者即堂兄弟之女已之堂姪女也在室則為小功親既適人則為降服緦麻也為人後者為從父兄弟之子伯從父兄子祖父已身為人後者叔從父弟子釋曰從父兄弟之子已之堂姪與已同祖者也正服本小功親今既出為人後則為之降服緦麻也女適人者為從父兄弟之子伯從父兄子祖父已身適人者叔從父弟子釋曰説義與前同已在室則為小功親既適人則為降服緦麻也為兄弟之孫為人後者兄子孫為人後者父已身弟子孫為人後者釋曰兄弟之孫者即已之親姪孫也伯叔祖父為姪孫本小功之親既出為人後則為降服緦麻也為兄弟之孫女適人者兄子孫女適人者父已身弟子孫女適人者釋曰兄弟之孫女者亦已之親姪女孫也伯叔祖父子姪女孫本小功服既適人則為降服緦麻也為人後者為兄弟之孫兄子孫父已身為人後者弟子孫釋曰既義與前同此即伯叔祖父出為人後為親姪孫降服緦麻也女適人者為兄弟之孫兄子孫父已身適人者弟子孫釋曰姑婆于親姪孫本小功服既適人則為降服緦麻也為人後者為從父姊妹之適人者伯從父姊適人者祖父已身為人後者叔從父妹適人者釋曰從父姊妹者謂親伯叔之女子堂姊妹也已出為人後于從父姊妹在室者降服小功今彼又適人則為降服緦麻也女適人者為從父兄弟之為人後者伯從父兄為人後者祖父已身適人者叔從父弟為人後者釋曰從父兄弟者即親伯叔之子堂兄弟也今既適人而其兄弟又出為人後則為降服緦麻也庶子為父後者為其母正一子亡祖父庶甲子承父後重者釋曰士之庶子為其所生母本服齊衰三年已既為父後承嫡矣則為其母降服緦麻而于母之父母兄弟姊妹則不服也言承祖之體主四時祭祀不敢以卑者之服為尊者之祭也為甥為人後甥女適人者舅身外祖父母母甥男為人後女適人者從母身釋曰姊妹所生之子皆吾外甥男女也正服乃小功親今甥既出為人後甥女又適人舅與從母當為降服緦麻也甥為人後甥女適人者為本身外祖父母及舅從母舅外祖父母母生身者甥身男為人後女適人者從母釋曰人子于母之父母兄弟姊妹本小功服今男既為人後女既適人則為之降服緦麻也然為人後者于所後家之外祖父母兄弟姊妹却當為服小功為同母異父兄弟為人後姊妹適人者甲父母先嫁之夫子女身母先嫁所生者母乙父母再嫁之夫子女身母再嫁所生者為人後適人者釋曰同母異父兄弟姊妹者説義詳見小功條下正服乃小功親今兄弟既出為人後而姊妹又適人則皆為降服緦麻也為人後者女適人者為同母異父兄弟姊妹甲父母先嫁之夫子女身母先嫁所生者母乙父母再嫁之夫子女身母再嫁所生者為人後適人者釋曰既義與前同已既出為人後而姊妹又適人則皆為降服緦麻也義服為族曽祖母族曽祖母高祖曽祖祖父已身族曽祖母釋曰族曽祖母者吾曽祖兄弟之妻俗呼為太伯祖母太叔祖母者也曽姪孫為之義服緦麻為夫兄弟之曽孫夫兄子孫曽孫夫父母妻身夫弟子孫曽孫釋曰即所謂太伯祖母太叔祖母為曽姪孫報服緦麻也為族祖母族曽祖父族祖母高祖曽祖祖父己身族曽祖父族祖母釋曰族祖母者即祖之從父兄弟之妻所謂親堂伯祖母叔祖母也已以堂姪孫為之義服緦麻三月為夫從父兄弟之孫夫伯父夫從兄子孫夫祖夫父妻身夫叔父夫從弟子孫釋曰即前條所謂親堂伯祖母叔祖母為堂姪孫報服緦麻也為族母族曽祖父族祖父族伯母高祖曽祖祖父已身族曽祖父族祖父族叔母釋曰族母者即父再從兄弟之妻蓋已以族姪為族伯母族叔母義服緦麻也為夫從祖兄弟之子夫伯祖從伯父從祖兄子曰再從姪夫曽祖夫祖夫父妻身夫叔祖從叔父從祖弟子曰再從姪釋曰此即前條所謂族伯母族叔母為夫再從姪報服緦麻為衆孫婦孫婦衆祖身子孫婦衆孫婦衆釋曰除嫡孫婦外餘皆為衆孫婦蓋祖父母為嫡孫婦服小功則宜為衆孫婦服緦麻也為庶母甲妾曰庶母子父正室子身乙妾曰庶母子釋曰子謂父生子之妾為庶母子于庶母本無情分然庶母而生子則父之所愛也愛父之所愛孝也故衆子宜為庶母服緦麻為乳母乳母子身釋曰乳母者謂乳養己者也乳母雖他人而于己則有乳哺之恩矣故亦為之義服緦麻也為壻外舅姑身壻釋曰説文云壻者女之夫也婦翁為壻義服緦麻而壻與婦翁服亦同也或謂翁壻相與情分似不薄而服制若是之輕何也蓋先王制服唯本宗為重于異姓則輕􅡇之與壻本異姓也况一以妻而親一以女而親又其相聚之日少而相違之日多服由是而推宜乎其緦也或者又謂舅甥亦異姓而服則小功何也蓋舅之服由母而推甥之服由姊妹而推故其重加于翁壻一等耳為妻之父母妻父母壻身釋曰爾雅云妻之父母曰外舅外姑其壻為之義服緦麻三月也若妻亡别娶亦服若妻之親母雖改嫁被出亦服詳見前條為夫之曽祖高祖父母夫高祖父母夫曽祖父母夫祖父母夫父母己身釋曰此曽玄孫婦為曽髙祖服緦麻三月也蓋曽玄孫婦于曽髙祖世已逺情已疏故服止宜于緦耳若其夫承曾髙祖重者其妻亦從服也為夫之從祖祖父母夫從祖祖父夫曽祖夫祖夫父妻身夫從祖祖母釋曰夫之從祖祖父從祖祖母者即夫之伯叔祖父伯叔祖母也夫為之服小功矣則妻宜為之服緦麻也為兄弟之孫婦兄子孫婦父已身弟子孫婦釋曰兄弟之孫親姪孫也已為親姪孫服小功則宜為其妻服緦麻也為夫兄弟之孫婦夫兄子孫婦夫婦妻身夫弟子孫婦釋曰伯叔祖為姪孫婦服緦麻而伯叔祖母亦同服者親親之義也為夫之從祖父母夫伯祖夫從祖父母夫曽祖夫祖夫父妻身夫叔祖夫從祖父母釋曰夫之從祖父母即舅之堂兄弟而已呼為堂伯叔祖堂伯叔祖母者也夫以堂姪而為之服小功故已以堂姪婦而為之服緦麻也為從父兄弟之子婦伯從兄子婦祖父已身叔從弟子婦釋曰此堂伯叔祖為堂姪婦報服緦麻也為夫從父兄弟之子婦夫伯夫從兄子婦夫祖夫父妻身夫叔夫從弟子婦釋曰此堂伯叔祖母為堂姪婦報服緦麻也為夫從父姊妹夫伯夫從姊夫祖夫父妻身夫叔夫從妹釋曰夫之從父姊妹者即夫之堂姊妹也夫為堂姊妹服大功則已以堂嫂而為堂姑義服緦麻雖適人不降也為夫從父兄弟之妻夫伯夫從兄妻夫祖夫父妻身夫叔夫從弟妻釋曰夫從父兄弟之妻即夫堂兄弟之妻而已之堂妯娌也故相為義服緦麻為人後者為從祖祖母從祖祖父曽祖祖父已身為人後從祖祖母釋曰從祖祖母者謂祖父兄弟之妻而已之伯祖母叔祖母也正服則為小功親今既出為人後則為降服緦麻也女適人者為從祖祖母從祖祖母曽祖祖父女身適人者從祖祖母釋曰説義與前同已在室則為之服小功今既適人則為降服緦麻也為夫兄弟之孫為人後者夫兄子孫為人後夫父母妻身夫弟子孫為人後釋曰妻為夫兄弟之孫者此伯叔祖母為親姪孫服也本為小功親今彼既出為人後則又降服緦麻也為夫兄弟之孫女適人者夫兄子孫女適人者夫父母妻身夫弟子孫女適人者釋曰伯叔祖母為在室姪孫女本服小功今彼既適人則為降服緦麻也為人後者為從祖母伯祖從祖母曽祖祖父已身為人後叔祖從祖母釋曰從祖母者即父從父兄弟之妻已俗呼為堂伯祖母堂叔祖母也本小功親已既出為人後則為降服緦麻也女適人者為從祖母伯祖從祖母曽祖祖父已身適人者叔祖從叔母釋曰説與前同已在室為堂伯母堂叔母義服小功既適人則降服緦麻也為夫從父兄弟之子為人後者夫伯夫從兄子為人後夫祖夫父妻身夫叔夫從弟子為人後釋曰夫從父兄弟之子即夫堂兄弟之子也已以堂伯叔母而為夫堂姪本服小功今既為人後則為降服緦麻也為夫從父兄弟之女適人者夫伯夫從兄女適人者夫祖夫父妻身夫叔夫從弟女適人者釋曰説與前同此即堂伯叔母為夫堂姪女服也在室則義服小功今適人則為降服緦麻也為夫之外祖父母及舅從母夫舅夫外祖父母妻身夫從母釋曰婦人于夫之外祖父母及舅從母情若疏逺而必為之服者何也蓋婦人視姑如母故于姑之父母兄弟姊妹皆不可以恝然忘情者為之義服緦麻蓋亦引而進之之義也為外孫婦外祖身女子外孫婦釋曰外祖為外孫服緦麻矣而為外孫婦亦服緦麻者亦引而進之之義也女為姊妹之子婦姊甥婦父母女身妹甥婦釋曰此母姨為外甥婦服也姨為外甥服小功矣則宜為其婦服緦麻也為甥之婦姊甥婦父母舅身妹甥婦釋曰舅為甥報服小功矣則亦宜為甥之婦服緦麻也內外服制通釋卷七

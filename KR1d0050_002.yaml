body:
  text: 内外服制通釋卷二宋車垓撰五服喪制名義斬衰服斬不緝也為父喪痛切至甚其服上下四旁皆不緝若刀斧斬剉而成故曰斬衰五服衰裳制度云在上曰縗在下曰裳凡衰外削幅裳内削幅外削幅者謂縫之邊幅向外也内削幅者謂縫之邊幅向内也五服之制皆准此又云衰者摧也以孝子有哀摧之心也禮云父服宜苴麻苴麻連根麻也不去根不浸緝不擇洗不殺邊其服用三升布為之升八十縷布闊二尺二寸經止二百四十縷則布極其麄矣故以為斬衰之服也不去其根者謂父子之道不絶其根本也苴子余切齊衰服齊音咨緝也服制與斬衰同但上下四旁皆緶緝之耳禮云母服用枲麻枲麻乃麻中黒色而多子者其麻亦不浸緝亦不擇洗其服用三升半布為之則其經當二百八十縷矣所以微異于斬衰之布也唐開元以前呼為齊音齊謂母没而其子齋戒三年也明皇以後改為齊音咨衰枲想里切斬衰杖用自死竹下連根為之故名曰苴杖長不過心葢取齊其心存其節也凡子為父用竹杖者何也謂父母子之天竹圓亦象天竹内外有節象子於父亦有内外之痛竹貫四時而不變子為父哀痛亦經寒温而不改也下連根者謂父子之道不絶其根本也苴杖削杖皆長齊心者葢杖所以扶病病必從心起故杖之長短必以心為㫁也禮曰童子不杖不能病也註謂庶童子也若當室童子則必用杖耳愚謂當室童子亦十嵗以上者乃能杖也家禮云凡婦人皆不杖葢酌古準今之意宜從之凡杖皆以根向下順其性也齊衰杖用桐木為之削取上圓下方名曰削杖長與苴杖同也凡子為母用桐削杖何也謂桐之為言同也欲取同心悲痛同於父也又以桐外無節象家無二尊也必削使下方者取母象於地也又桐之子隨枝葉而生象母能生子無絶道寢苫枕凷按禮居父母喪三月卧茒葢苫枕凷音塊註云卧茒為茒有刃葢苫為苫有芒枕凷以土塊為枕使孝子席枕不完睡卧不安以思其父母也百日卒哭父母喪百日内哭無時亦無常處但哀至即哭耳百日之外止於靈座前朝夕哭而已其他時他處雖哀至亦不哭故曰卒哭禮三月而葬葬而虞虞而卒哭皆有祭卒哭祭後孝子可以疏食水飲寢席枕木矣十三月小祥自始死之月數起至次年所死之月凡十三月矣是名曰小祥祥者練也善也吉也孝子至此設小祥之祭祭畢則除首絰去負版辟領衰而服練服也練服謂以熟布為冠服也葢漸漸去㐫即吉之意也二十五月大祥自始死之月數起至第三年所死之月凡二十五月矣是名曰大祥大祥者大吉也孝子至此設大祥之祭祭畢奉神主入祠堂撤靈座去衰裳弃絰杖而服禫服也禫服者謂以黔布為冠服也禮所謂喪二十五月而畢者葢亦言禫也二十七月禫祭禮曰大祥之後中月而禫鄭氏曰中間也朱子曰間一月也自初喪至此不計閏凡二十七月謂如正月大祥方二十五月祥祭之後即服禫服至於二月則二十六月也又及乎三月然後方滿二十七月却於三月之内選卜一日行禫祭禮是則所謂二十七月而禫祭也間月而禫者正謂祥祭與禫祭相間一月也踰月從吉禫祭雖畢孝子猶未忍遽即吉也故又服此禫服盡此月之終至于次月之改朔然後除禫服服吉服而行吉事是則所謂踰月從吉也踰月云者葢以改朔為月非以三十日為月也故禮云徹晦至朔為踰月已上皆從鄭氏之説也喪稱三年實計二十七月而謂之三年者葢以年辰計之而不以月日計之也謂如子年死至丑年而小祥又至寅年而大祥既跨涉子丑寅三年矣故謂之三年也正服正先祖之體本族之正也故曰正服加服加者増也本體輕而増之扵重如孫為祖本服期或以嫡孫承祖則服斬衰三年若此之類名曰加服降服降者下也減也本服重而減之從輕如子為父母本服三年或為人後則為本生服期年耳若此之類名為降服義服元非本族以義相聚而為之服如夫為妻舅姑為子婦之類名曰義服齊衰杖期唐明皇諱基改期為周至宋紹興詔敕中方改周為期服制與三年者同但用尋常次等生麻布為之禮用四升五升布不裁濶中不用負版衰為稍異耳服此服而持哭杖自初喪數至十一箇月而練十三箇月而祥十五箇月而禫然後除之齊衰不杖期服制與杖期同但不持哭杖至周年而止耳齊衰五月服制同上但服五箇月而除之也齊衰三月服制同上但服三箇月而除之也大功九月服制同上但用稍緦熟麻布為之禮用八升九升布大功小功云者以治布之功有精粗而言也大功之服比期親之情而又疎比小功緦麻而又大故名之曰大功服此服至九箇月而除之或為期喪而中殤者則亦以大功至七箇月而除之禮曰九月七月之喪三時者是也小功五月服制同上其布又細于大功之布故曰小功禮用十升十布升服此服至五箇月而除之也聖人制服而分五等正以人之情義有親疎逺近之殊故自斬衰而下布漸加細而月漸加少以别其親疎逺近也小功之服比期親大功之情又逺矣故闕孝之月減小功之半也緦麻三月服制同上但以極細熟麻布為之緦即絲之義也禮布用十五升抽其半抽其半者八十縷為一升乃千二百縷抽其半六百縷世俗以為九升半升闕今時服簆用闕縷此一服簆闕也縷如單串布可謂細而疎最輕白虎通云緦麻之布用麻與絲相兼而成故曰緦麻今世俗以落機熟苧布為之或以生絹為之葢省約也然亦未嘗用縗裳之制但為襴衫而已要亦以其服之至輕故也緦麻之服盡三月而止者葢三月為一時亦天道之小變也三殤之服殤者傷也以其年幼而亡可悲傷也故謂之殤三殤者長殤中殤下殤也男女年八嵗至十一嵗為下殤十二嵗至十五嵗為中殤十六嵗至十九嵗為長殤凡為殤服者皆于本服内以次降一等如應服期而長殤則降服大功九月中殤則大功七月下殤則小功五月應服大功而長殤則降服小功五月中殤下殤則緦麻三月應服小功而長殤則降服緦中下殤則無服也不滿八嵗者為無服之殤哭之以日易月本服期者哭之以十三日大功九日小功五日緦麻三日是之謂三殤之服也男已娶女許嫁皆不以殤論也其詳又具五服圖説之後無服謂之袒免親袒免親葢五服之外五世之親也袒謂偏脱一袖也臨喪而袒所以示哀苦之勞也免謂裂布廣寸自項向前交於額上却遶髻如着掠頭也古者五服之人將帶首絰必先之以免故於五世之親而以袒免為服也然袒免之儀其廢久矣故今之人雖齊衰帶絰而亦未嘗免也是以于五世之親不為袒免之服止于成服之日白襴縞巾吊哭而已免音問改葬服韓文公改葬服議云經曰改葬緦榖梁傳亦曰改葬之禮緦舉下緬也此皆謂子於父母其他則皆無服云云又曰衛司徒文子改葬其叔父問服于子思子思曰禮父母改葬緦既葬而除之不忍無服送至親也非父母則無服也無服亦吊服而加麻此又其著者也云云或曰經稱改葬緦而不著其月數則似三月而後除也子思之對文子則曰既葬而除之今宜如何曰自啟至于既葬而三月則除之未三月則服以終三月也曰妻為夫如何曰如子已上皆韓公之議也愚竊謂改葬之禮多行於除服從吉之餘聖人謂孝子不可以吉服送至親也故令以緦服將事特用此至輕之㐫服以别異于吉服耳若有取于緦麻三月之制也故經止言改葬緦而不著其月數也子思既葬而除之説得其旨矣韓公服終三月之議葢本於儀禮注疏之失非聖人意也朋友服議魯齋王柏咸淳戊辰臘月十有九夜承北山何先生之訃次早排闗往哭之既斂僕雖以深衣入哭隠之于心疑所服之未稱也自吾夫子之喪門人不立正服乃以義起若喪父而為心喪程子曰師可立服不可立也當以情之厚薄事之大小處之若顔閔之於孔子雖斬衰三年可也其成已之功若君父並其次各有淺深稱其情而已僕于北山受教為甚深豈可自同于流俗因思儀禮喪服有朋友麻三字豈非朋友之服乎鄭康成云朋友雖無親有同道之恩相為服緦之絰帶又曰士以緦麻為喪服其吊服則疑衰疑之為言擬也緦麻之布十五升疑衰十四升即白麻深衣擬于吉服也葢緦衰服之極輕者也他無服矣止有吊服所以擬之註云吊服如麻其師與朋友同既葬除之疏云以白布深衣庶人之常服又尊卑未成服以前服之故庶人得為吊服素冠吉履無絇其弔服圖云庶人弔服素委貌白布深衣士朋友相為服弔服加麻加麻者即加緦之絰帶是為疑衰或曰深衣吉服也而可為吊服乎僕曰註固已云擬于吉服也况非正為弔服親疾病時男女改服註云庶人服深衣又曰子為父斬衰尸既襲衣十五升布深衣扱上袵徒跣交手哭是孝子未成服亦服深衣也或者又曰安知深衣為弔服又為麻純乎僕曰純之以采者曰深衣純之以麻者曰麻衣純之以素者曰長衣以采緣之袖長在外則曰中衣又各自有名不可亂也或又曰子創為此服豈不驚世駭俗人將指為怪民矣僕曰以深衣為弔服鄉閭亦行之但未有麻耳是服也勉齋黄先生考之為至詳其書進之於朝藏於祕省板行天下非一家之私書也遵而行之豈得為過僕于北山成服日服深衣加絰帶冠加絲武即素委貌覆以白巾見者未嘗以為怪越數日通齋葉仲成父來弔僕問昔日毅齋之喪門人何服曰初遭喪時朋友以襴襆加布帶其後共考儀禮至葬時方以深衣加絰帶僕於是釋然知其無戾於禮也故作朋友服議絇音劬履頭繩履飾也純音準緣也委貎乃冠冕之屬也愚昔侍兄玉峰肄業上蔡書堂時堂長魯齋出示此議愚于勉齋之書未曽得見今於此議又恐不行于世故并附于通釋之後俾世之師友者知之而不可忽也五服提要緦麻之親有四曽祖兄弟祖從父兄弟父再從兄弟身之三從兄弟小功之親有三祖之兄弟父之從父兄弟身之再從兄弟男子無大功尊按禮男子於髙祖服緦麻曽祖服小功祖服期父母三年是無大功尊也大功尊按禮男子無大功尊惟婦人於夫之祖父母及夫伯叔父母是大功尊大功長謂從父兄姊之類無大功以上親者伯叔父母姑兄姊是也小功尊謂從祖祖父母姑從祖伯叔父母姑外祖父母舅從母之類小功長謂從祖兄姊之類袒免按禮有五刑統議曰緦麻之外即是袒免高祖兄弟曽祖從父兄弟祖再從兄弟父三從兄弟身之四從兄弟女嫁反在父之室謂女在夫家本為父母降服期若降服未滿被出則服其本服三年如降服已滿被出則不復服也嫡孫為祖謂承重者承高曽祖亦如之父為長子重謂其當先祖之正體將代已為宗廟主者故庶子不得為長子三年不繼祖與禰也庶子之嫡孫乃得為其嫡子三年凡婦人皆不杖按禮經圖多有婦人杖文然此乃文公㕘酌時宜之特筆也門人楊復不曉師意輒加論辯且以未得是正為恨何其疎也内外服制通釋卷二

body:
  text: 內外服制通釋卷四宋車垓撰齊衰杖期正服嫡孫父卒祖在為祖母祖母祖父存父先祖而卒嫡孫身釋曰嫡孫既承祖後本為祖母服齊衰三年祖父在則為服齊衰杖期而已降服為嫁母出母母父卒母嫁曰嫁母父在母出曰出母子身釋曰嫁母出母於吾父則義絶矣故子為之降服齊衰杖期蓋子為母本服三年今以嫁出故故降之從輕也若子為父後承重者則不為服止申心喪謂與尊者為體不敢服其私親也漢石渠義問父卒母嫁為之何服蕭太傅云當服期為父後則不服弟元成以為父沒則母無出嫁之義王者不為無義制禮若服期則是子貶母也故不制服宣帝詔曰婦人上不養舅姑中不奉祭祀下不慈子是自絶也故聖人不為制服若明子無貶母之義元成議是也愚竊謂所議嫁母一節若子可依而母改嫁宜從元成之議若子不可依母不得已而改嫁者則為服杖期不為過也義服為父卒繼母嫁而已從之者甲父卒乙母父先娶亡子身丙母父後娶釋曰甲父先娶乙母而生已乙母亡父再娶丙母是為繼母後甲父卒繼母再嫁他人而已從之以寄育焉繼母亡則已為服齊衰杖期義服也繼母為其子亦義服不杖期若繼母嫁而已不從之及繼母被出者皆無服也夫為妻夫身妻釋曰禮云生曰妻死曰嬪妻者齊也與夫齊體之人雖異姓共處其義則深故妻亡而夫義服齊衰杖期按禮父母在為妻不杖嬪毗賓切齊衰不杖期正服為祖父母女雖適人不降祖父母父母男女孫身釋曰祖父母者父之父母也孫為祖父母正服不杖期孫女雖適人不降若嫡孫承重者則加服齊斬三年為庶祖母庶祖母父所生母父母子孫身釋曰庶祖母亦祖母也故孫亦為服不杖期也若孫承祖父後則不服為伯叔父伯父祖父叔父釋曰伯父叔父謂父之親兄弟也伯叔父視姪猶子而為姪服不杖期故姪為伯叔父亦服不杖期也為兄弟兄父母已身弟釋曰兄弟者已之親兄弟也廣雅云兄况也况於父也弟悌也順于兄也故兄為弟弟為兄皆服不杖期也為衆子父母身衆子釋曰衆子者除嫡長子外其餘若正若庶若男若女若養人之子皆謂之衆子父母並為服不杖期若妾子雖最長亦與衆子同也為兄弟之子兄子女在室同父母已身弟子女在室同釋曰或為兄之子或為弟之子皆服不杖期也夫為衆子則不杖期而為兄弟之子亦不杖期何也曰兄弟之子猶子也蓋引而進之也為姑姊妹女在室及適人無主者姑姊祖父已身女姑妹釋曰徐鍇云姑故也言尊如故也姊咨也以其先生可咨問也説文云妹女弟也又謂之媦廣雅云女如也白虎通云言如人也徐鍇云女子從父之教從夫之命故曰如人也謂姑姊妹女未適人而亡者則已為服不杖期也或已適人而喪夫無子是無夫與子為祭主此乃人之所哀憐故不忍降之大功而亦為服不杖期也婦人無夫與子者為其兄弟姊妹及兄弟之子兄弟子女在室同父母女身姊妹在室者釋曰已適人之婦人於兄弟姊妹姪本降服大功今既無夫無子則不敢降而為服不杖期蓋婦人有歸宗之義也妾為其子妾身子釋曰妾為其子即母為子也故服不杖期若其子承祖父後則其母合為服齊衰三年加服為嫡孫有嫡子無嫡孫父母身嫡子亡嫡孫嫡曽孫嫡玄孫釋曰祖為孫本服大功而為承重之嫡孫則服不杖期也有嫡子無嫡孫者謂祖父若有嫡子在則更不立嫡孫也凡為後承嫡者雖曽孫玄孫亦與嫡孫同假如曽孫與曽祖父承重玄孫與髙祖父承重其曽髙二祖服曽玄二孫服亦與嫡孫同也女適人者為兄弟之為父後者兄為父後者父母女身適人者弟為父後者釋曰女適人者為兄弟本降服大功若兄弟為父後承重者則為加服不杖期也降服嫁母出母為其子母身或父卒改嫁之母或父在被出之母子母所生親子也子雖為人後猶服也釋曰父卒而母嫁與父在而母出則母於吾父有絶義矣故子為之降服杖期然母之於子則義不絶也故仍為子服不杖期為人後者為本生父母本生父母子身為人後者釋曰子為父母本服三年既為人後則以所後為父母矣故為本生父母降服不杖期申心喪三年本生父母為其子之為人後者本生父母身子為人後者釋曰父母為衆子本服不杖期子雖為人後亦服也女適人者為父母父母女身適人者釋曰女在室為父母服與男子同已適人則降服不杖期也或降服未滿被出則仍為父母服重服滿三年而止或降服已除被出則不必更服也妾為其父母父母妾之親也妾身釋曰凡女適人者為其私親皆降一等故為人妻者為其父母降服不杖期而妾于父母亦同義服繼母嫁為前夫之子從已者繼母身再嫁者子從繼母嫁者釋曰子無母而以繼母為母矣及父卒又從繼母再嫁而寄育焉則繼母亦視之如子可也故為義服不杖期即父母為衆子之服也為伯叔母伯母祖父母父母姪身叔母釋曰禮云其夫屬乎父道者妻皆母道也故姪呼伯父叔父之妻曰伯母叔母而亦為服不杖期義服也為繼父同居者謂子無大功以上親從母適人所適者亦無大功之親者正父嫁母子身從母再嫁與繼父同居者繼父釋曰父卒子幼隨母適人呼所適者曰繼父子與繼父同居義聚故為繼父義服不杖期也通典云繼父同居者服期夫死妻稚子幼無大功之親與之俱適人馬融曰稚者幼小也無大功之親以收養之故母子俱行適人鄭玄曰妻稚未五十也子幼十五以下者也大功親謂堂兄弟同財者所適者亦無大功之親而以其子之財貨為之築宫廟于家之門外嵗時使之祀焉妻不敢與若是則得繼父之道故同居則服齊衰三月鄭玄曰築宫于門外神不歆外族也此以恩報耳妾為女君女君主人之嫡妻也妾身釋曰妾謂主母曰女君者尊之也故為義服齊衰不杖期妾為君之衆子妾身有子者也君之衆子釋曰除夫君之嫡子外無問妻妾所生皆謂之衆子父母於衆子正服不杖期則妾亦合為義服不杖期也夫妾為君之衆子服即庶母為衆子服也然衆子為庶母正服緦麻而庶母為衆子則不杖期何也蓋庶母本妾也妾則賤而子則貴矣貴賤之殊輕重之别也且庶母之期也一則從夫君與主母而服已不得而殺也一則以賤妾之身將終養于夫君之家故於衆子之服亦不得而輕也為夫兄弟之子夫兄子女在室同夫妻夫弟子女在室同釋曰此伯叔母為夫姪服也夫姪呼已為母則已視姪猶子也故為義服不杖期即父母為衆子之服也舅姑為嫡婦長子婦舅姑身衆子婦釋曰嫡長子之婦謂之冡婦所以奉宗廟為主婦者也非衆子婦比也故舅姑為服不杖期而為衆子婦則大功而已周制為嫡婦大功唐貞觀十四年侍中魏徵奏嫡子婦律服大功請加為期上從之齊衰五月正服為曽祖父母曽孫女雖適人不降曽祖父母祖父母父母已身是為曽孫釋曰曽重也謂重祖父母也曽孫于曽祖父母世雖稍逺義則至親故以小功之月數而服齊衰之重服也齊衰三月正服為高祖父母玄孫女雖適人不降高祖父母曽祖父母祖父母父母玄孫身釋曰玄孫逮事髙祖父母亦慶幸事也義則至親世則逺矣故以緦麻之月數而服齊衰之重服也義服為繼父不同居繼父母母之夫也子身嫁母之子也釋曰謂先同居而後不同居者也先曽同居則有寄育之恩相依之義矣故為繼父義服齊衰三月也或雖同居而繼父有子已有大功以上親則亦與不同居例論亦止服不同居之服而已若原不同居則無服內外服制通釋卷四
